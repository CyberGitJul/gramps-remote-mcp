# Tooling configuration only (this project is run from source, not packaged).
[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# E/W = pycodestyle, F = pyflakes, I = isort, B = flake8-bugbear, UP = pyupgrade.
select = ["E", "F", "I", "W", "B", "UP"]
# Line length is enforced by the formatter, not the linter, so long string/
# comment lines the formatter can't split don't fail the lint gate.
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# Tests intentionally group an error-class import with the test section that
# uses it, rather than hoisting every name to a single top-of-file block.
"tests/*" = ["E402"]

[tool.ruff.format]
# black-compatible defaults.
